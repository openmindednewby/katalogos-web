events {}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  # Public embed routes (menu) must be iframe-able from external sites. The CSP
  # has to be emitted even for deep links like /public/menu/<id>, which do NOT
  # exist as files and fall through `try_files` to /index.html — an INTERNAL
  # redirect served by `location /`. A per-location `add_header` does not survive
  # that cross-location redirect (that was the bug: only real files like
  # /manifest.json kept their header). So key off $request_uri (unchanged by
  # internal redirects) at the http/server level instead. Empty value => nginx
  # omits the header, so only the embed routes get frame-ancestors *.
  map $request_uri $embed_csp {
    ~^/public/(survey|menu)/  "frame-ancestors *";
    default                    "";
  }

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # 🔴 RELATIVE redirects only — never leak the internal upstream host.
    # Where the web export emits DIRECTORY-style routes, nginx issues a directory
    # redirect /route -> /route/. With the default absolute_redirect ON and no
    # public server_name, nginx builds that Location from the in-cluster Service
    # name → `http://<app>-web/route/`, which the browser cannot resolve, and it
    # downgrades https to http. Result: the route is DEAD on direct navigation,
    # bookmark or hard refresh, while click-through SPA nav still works — which is
    # exactly why it hides from click-driven tests. Observed live on agora:
    #   GET https://app.agora.dloizides.com/products -> 301 http://agora-web/products/
    # port_in_redirect off drops the :8080 variant of the same leak.
    absolute_redirect off;
    port_in_redirect off;

    # Server-level (inherited by `location /`, which serves the SPA + the
    # index.html try_files fallback). Only the public embed routes get a value.
    # NOTE: a `location` block that declares its own `add_header` REPLACES all
    # inherited add_header directives, so any location below that sets a header
    # MUST re-emit this CSP to avoid dropping it.
    add_header Content-Security-Policy $embed_csp always;

    # --- Cache policy (SaaS SPA/PWA auto-update standard) ------------------
    # Expo's bootstrap bundles (entry / metro-runtime / common) keep a STABLE
    # filename across builds even when the lazy route chunks they reference get
    # new hashes — so serving them `immutable` poisons returning users with a
    # stale chunk map (they keep loading the old route chunk and crash/blank
    # after a deploy). `no-cache` forces an ETag revalidation (304 when
    # unchanged) so a deploy is always picked up. The route chunks themselves ARE
    # content-hashed and stay immutable below; this regex location WINS over the
    # /_expo/ prefix in nginx, so only these three bootstrap bundles are affected.
    # Re-emit the CSP: a location with its own add_header DROPS every inherited
    # add_header (so without this line the embed CSP would be lost on these URLs).
    location ~ ^/_expo/static/js/web/(entry-|__expo-metro-runtime-|__common-) {
      add_header Content-Security-Policy $embed_csp always;
      add_header Cache-Control "no-cache";
      try_files $uri =404;
    }

    # Content-hashed Expo build output (/_expo/, filename hash changes on every
    # rebuild) is safe to cache forever — this is what makes repeat loads fast.
    location /_expo/ {
      add_header Content-Security-Policy $embed_csp always;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # The HTML entry must NEVER be cached: it references the hashed bundles, so
    # revalidating on every load (ETag -> 304 when unchanged) means a deploy is
    # picked up on the next navigation/refresh — no hard refresh, no stale app.
    # This is the "auto-update" mechanism for a no-service-worker SPA.
    location = /index.html {
      add_header Content-Security-Policy $embed_csp always;
      add_header Cache-Control "no-cache";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /manifest.json {
      add_header Content-Security-Policy $embed_csp always;
      add_header Cache-Control "no-cache";
    }

    location /service-worker.js {
      add_header Content-Security-Policy $embed_csp always;
      add_header Cache-Control "no-cache";
    }
  }
}
